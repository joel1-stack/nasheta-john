<div class="page-enter">

<div class="page-hero">
  <div class="container">
    <span class="s-label">Capabilities</span>
    <h1 class="s-title">Skills & <span class="blue">Tools</span></h1>
    <p class="s-desc">A decade of specialist experience distilled into a clear picture of what I bring to every project.</p>
  </div>
</div>

<section class="skills-section">
  <div class="container">

    <!-- Tools -->
    <div class="skills-block reveal">
      <h2 class="block-title"><span class="block-num">01</span> Software & Tools</h2>
      <div class="tools-grid">
        <div class="tool-chip" *ngFor="let t of tools">
          <span class="tc-dot"></span>
          <span class="tc-name">{{ t.name }}</span>
          <span class="tc-cat">{{ t.cat }}</span>
        </div>
      </div>
    </div>

    <!-- Technical -->
    <div class="skills-block reveal">
      <h2 class="block-title"><span class="block-num">02</span> Technical Skills</h2>
      <div class="tech-list">
        <div class="tech-item" *ngFor="let t of technical">
          <div class="tech-row">
            <span class="tech-skill">{{ t.skill }}</span>
            <span class="tech-pct">{{ t.level }}%</span>
          </div>
          <div class="tech-bar">
            <div class="tech-fill" [style.width.%]="t.level"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="skills-bottom-grid">

      <!-- Personal -->
      <div class="skills-block reveal">
        <h2 class="block-title"><span class="block-num">03</span> Personal Skills</h2>
        <div class="personal-grid">
          <div class="personal-chip" *ngFor="let p of personal">{{ p }}</div>
        </div>
      </div>

      <!-- Languages -->
      <div class="skills-block reveal">
        <h2 class="block-title"><span class="block-num">04</span> Languages</h2>
        <div class="lang-list">
          <div class="lang-item" *ngFor="let l of languages">
            <div class="lang-row">
              <span class="lang-name">{{ l.lang }}</span>
              <span class="lang-level">{{ l.level }}</span>
            </div>
            <div class="lang-bar">
              <div class="lang-fill" [style.width.%]="l.pct"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>

</div>
