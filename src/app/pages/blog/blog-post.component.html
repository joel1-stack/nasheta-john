<div class="page-enter" *ngIf="post">
  <article class="post">
    <header class="hero">
      <img class="cover" [src]="post.coverImage" [alt]="post.title" />
      <div class="overlay"></div>
      <div class="container hero-inner">
        <div class="kicker">{{ post.category }}</div>
        <h1>{{ post.title }}</h1>
        <div class="meta">
          <span>{{ post.dateISO }}</span>
          <span class="dot">•</span>
          <span>{{ post.readMinutes }} min read</span>
        </div>
      </div>
    </header>

    <div class="container content">
      <div class="crumbs">
        <a routerLink="/blog">← Back to Blog</a>
      </div>

      <div class="prose" [innerHTML]="post.contentHtml"></div>

      <div class="author">
        <div class="av">NJ</div>
        <div>
          <div class="nm">Nasheta John</div>
          <div class="tx">iGaming Content Specialist — Nairobi, Kenya</div>
        </div>
        <a class="cta" routerLink="/contact">Work With Me</a>
      </div>
    </div>
  </article>
</div>
